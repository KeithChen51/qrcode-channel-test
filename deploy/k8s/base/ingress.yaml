apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qrcode-ingress
  namespace: qrcode
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - qrcode.company.com
      secretName: qrcode-tls
  rules:
    - host: qrcode.company.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /jump
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

