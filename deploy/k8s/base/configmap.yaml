apiVersion: v1
kind: ConfigMap
metadata:
  name: qrcode-config
  namespace: qrcode
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_HOST: "mysql.company.internal"
  DB_PORT: "3306"
  DB_NAME: "qrcode_channel"
  DB_USERNAME: "qrcode_user"
  STORAGE_TYPE: "minio"
  MINIO_ENDPOINT: "https://obs.example.com"
  MINIO_BUCKET: "qrcode-images"
  APP_BASE_URL: "https://qrcode.company.com"
  APP_CORS_ALLOWED_ORIGINS: "https://qrcode.company.com"
  WECHAT_MP_APPID: "your_mp_appid"

