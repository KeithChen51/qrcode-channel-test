server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 应用配置
app:
  base-url: ${APP_BASE_URL:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

auth:
  admin-username: ${ADMIN_USERNAME:admin}
  admin-initial-password: ${ADMIN_INITIAL_PASSWORD:}
  token-secret: ${AUTH_TOKEN_SECRET:}
  token-ttl-minutes: ${AUTH_TOKEN_TTL_MINUTES:720}
  login-max-attempts: ${AUTH_LOGIN_MAX_ATTEMPTS:5}
  login-lock-minutes: ${AUTH_LOGIN_LOCK_MINUTES:10}

security:
  rate-limit:
    scan:
      max-requests: ${SCAN_RATE_LIMIT_MAX_REQUESTS:60}
      window-seconds: ${SCAN_RATE_LIMIT_WINDOW_SECONDS:60}

wechat:
  # For wx-open-launch-weapp signature in WeChat browser.
  mp-app-id: ${WECHAT_MP_APPID:}
  mp-app-secret: ${WECHAT_MP_SECRET:}
