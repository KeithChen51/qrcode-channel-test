version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:5.7
    container_name: qrcode-mysql-prod
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_secure_password}
      MYSQL_DATABASE: qrcode_channel
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - qrcode-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储（生产环境可替换为华为云OBS）
  minio:
    image: minio/minio:latest
    container_name: qrcode-minio-prod
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-your_secure_password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - qrcode-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrcode-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=qrcode_channel
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-your_secure_password}
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-your_secure_password}
      - MINIO_BUCKET=qrcode-images
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - qrcode-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qrcode-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - qrcode-network

volumes:
  mysql_data:
  minio_data:

networks:
  qrcode-network:
    driver: bridge
