services:
  mysql:
    image: mysql:5.7
    container_name: qrcode-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_secure_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qrcode_channel}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - qrcode-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrcode-backend
    restart: always
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-qrcode_channel}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-your_secure_password}
      - APP_BASE_URL=${APP_BASE_URL:-}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-*}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-}
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET:-}
      - AUTH_TOKEN_TTL_MINUTES=${AUTH_TOKEN_TTL_MINUTES:-720}
      - AUTH_LOGIN_MAX_ATTEMPTS=${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      - AUTH_LOGIN_LOCK_MINUTES=${AUTH_LOGIN_LOCK_MINUTES:-10}
      - SCAN_RATE_LIMIT_MAX_REQUESTS=${SCAN_RATE_LIMIT_MAX_REQUESTS:-60}
      - SCAN_RATE_LIMIT_WINDOW_SECONDS=${SCAN_RATE_LIMIT_WINDOW_SECONDS:-60}
      - WECHAT_MP_APPID=${WECHAT_MP_APPID:-}
      - WECHAT_MP_SECRET=${WECHAT_MP_SECRET:-}
    networks:
      - qrcode-network

volumes:
  mysql_data:

networks:
  qrcode-network:
    driver: bridge
